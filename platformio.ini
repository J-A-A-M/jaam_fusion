[platformio]
default_envs = firmware

[env:firmware]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = time
board_build.partitions = min_spiffs.csv
extra_scripts = pre:tools/pre_build.py
lib_deps =
    https://github.com/MatheusAlvesA/ArduinoAsync.git
    https://github.com/J-A-A-M/melody-player.git@2.4.0
    adafruit/Adafruit NeoPixel@1.15.4
    bblanchon/ArduinoJson@7.4.3
    gilmaimon/ArduinoWebsockets@0.5.4
    denyschuhlib/NTPtime@1.2.1
    olikraus/U8g2@2.36.17
    sensirion/arduino-sht@1.2.6
    https://github.com/enjoyneering/AHTxx.git@1.2.0
	soylentorange/forcedBMX280@1.1.1
    wollewald/BH1750_WE@1.1.10
	dfrobot/DFRobot_DF1201S@^1.0.2
    mathertel/OneButton@2.6.2
    tobozo/ESP32-targz@1.3.1
build_flags =
    -D BME280_ENABLED
	-D SHT2X_ENABLED
	-D SHT3X_ENABLED
    -D AHTXX_ENABLED
	-D BH1750_ENABLED
    -D BUZZER_ENABLED
	-D DFPLAYER_PRO_ENABLED
    -D DISPLAY_ENABLED
    -D VERSION=\"5.0.1\"
    -D CONFIG_ASYNC_TCP_MAX_ACK_TIME=5000 # (keep default)
    -D CONFIG_ASYNC_TCP_PRIORITY=10 # (keep default)
    -D CONFIG_ASYNC_TCP_QUEUE_SIZE=64 # (keep default)
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1

[env:telnet]
extends = env:firmware
lib_deps =
    ${env:firmware.lib_deps}
    yasheena/TelnetSpy@1.4
build_flags =
    ${env:firmware.build_flags}
    -D TELNET_ENABLED

[env:test_animation]
extends = env:firmware
build_flags =
    ${env:firmware.build_flags}
    -D TEST_ANIMATION

[env:test_min_of_silence]
extends = env:firmware
build_flags =
    ${env:firmware.build_flags}
    -D TEST_MIN_OF_SILENCE

[env:firmware_esp32s3]
extends = env:firmware
board = esp32-s3-devkitc-1
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_upload.flash_size = 4MB
board_build.partitions = custom_4MB.csv

[env:firmware_esp32c3]
extends = env:firmware
board = esp32-c3-devkitc-02
build_unflags =
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
build_flags =
    ${env:firmware.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=0

[env:test_mode]
extends = env:firmware
build_src_filter = +<../src/> -<../src/JaamFusion.cpp> -<../src/JaamApi.cpp> -<../src/JaamSiren.cpp> -<../src/JaamWeb.cpp> -<../src/JaamAnimation.cpp> +<../test_mode/>
build_flags =
    ${env:firmware.build_flags}
    -D TEST_MODE
    -D JAAM_VERSION=3
