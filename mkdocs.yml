site_name: JAAM Fusion Documentation
site_url: https://info.jaam.net.ua/
repo_url: https://github.com/J-A-A-M/jaam_fusion
repo_name: J-A-A-M/jaam_fusion
edit_uri: edit/main/wiki/
docs_dir: wiki
exclude_docs: |
  README.md

theme:
  name: material
  language: uk
  palette:
    # Світла тема (відповідає :root у styles.css)
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Перемкнути на темну тему
    # Темна тема (відповідає [data-theme='dark'] у styles.css)
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Перемкнути на світлу тему
  
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  
  icon:
    repo: fontawesome/brands/github
  
  favicon: assets/favicon.ico
  logo: assets/logo.png

extra_css:
  - stylesheets/custom.css

extra_javascript:
  # Math rendering for pymdownx.arithmatex (generic: true)
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  # Mermaid diagrams (```mermaid)
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/J-A-A-M/jaam_fusion
    - icon: fontawesome/brands/telegram
      link: https://t.me/jaam_project

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: J-A-A-M
      repo: jaam_fusion
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: uk
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime

nav:
  - Головна: index.md
  - Початок роботи:
      - Швидкий старт: getting-started/quickstart.md
      - Встановлення: getting-started/installation.md
      - Перша конфігурація: getting-started/first-config.md
  - Обладнання:
      - Підтримувані плати: hardware/boards.md
      - OLED Дисплей: hardware/oled-display.md
      - Сенсори:
        - Огляд: hardware/sensors.md
        - Сенсори клімату: hardware/sensors/climate-sensors.md
        - Сенсор освітлення: hardware/sensors/light-sensor.md
      - Звук:
        - Огляд: hardware/sound.md
        - Buzzer: hardware/sound/buzzer.md
        - DF Player Pro: hardware/sound/df-player-pro.md
      - LED Mapping: hardware/led-mapping.md
  - Функціонал:
      - Повітряні тривоги: features/air-alerts.md
      - Погода: features/weather.md
      - Радіація: features/radiation.md
      - Стан електромережі: features/power-grid.md
      - Настільна лампа: features/desk-lamp.md
      - Хвилина мовчання: features/minute-of-silence.md
      - Часовий пояс: features/time-zone.md
  - API і інтеграції:
      - Home Assistant: api/home-assistant.md
  - Веб-інтерфейс:
      - Налаштування:
        - Огляд: web-interface/settings.md
        - Секції налаштувань:
          - Загальні: web-interface/sections/general.md
          - Дисплей: web-interface/sections/display.md
          - Мережа: web-interface/sections/network.md
          - Апаратне забезпечення: web-interface/sections/hardware.md
          - Сирена: web-interface/sections/siren.md
          - Клімат: web-interface/sections/climate.md
          - Анімації: web-interface/sections/animations.md
          - Яскравість: web-interface/sections/brightness.md
          - Тривоги: web-interface/sections/alerts.md
          - Звук: web-interface/sections/sound.md
          - Оновлення прошивки: web-interface/sections/firmware.md
      - Редактор карти: web-interface/map-editor.md
      - Редактор кольорів: web-interface/color-editor.md
  - Плати JAAM:
      - JAAM 1.3: jaam-boards/jaam-1-3.md
      - JAAM 2.1: jaam-boards/jaam-2-1.md
      - JAAM 3.2: jaam-boards/jaam-3-2.md
  - Для розробників:
      - Архітектура: development/architecture.md
      - UI Контроли: development/controls-guide.md
      - Web Assets: development/web-assets.md
      - Збірка проєкту: development/building.md
      - Contribution Guide: development/contributing.md
  - Довідник:
      - Changelog: reference/changelog.md
      - FAQ: reference/faq.md
      - Troubleshooting: reference/troubleshooting.md
