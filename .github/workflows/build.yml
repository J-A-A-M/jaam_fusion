name: Build

on:
  push:
    branches: [ develop ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [firmware, firmware_esp32s3, firmware_esp32c3]

    steps:
    - uses: actions/checkout@v6

    - name: Cache pip
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache PlatformIO
      uses: actions/cache@v5
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-platformio-

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
        pip install intelhex

    - name: Build ${{ matrix.environment }}
      run: platformio run -e ${{ matrix.environment }}

    - name: Build artifact size check
      run: |
        echo "Firmware binary size for ${{ matrix.environment }}:"
        if ! ls .pio/build/${{ matrix.environment }}/*.bin 1> /dev/null 2>&1; then
          echo "ERROR: No binary files found in .pio/build/${{ matrix.environment }}/"
          exit 1
        fi
        ls -lh .pio/build/${{ matrix.environment }}/*.bin
