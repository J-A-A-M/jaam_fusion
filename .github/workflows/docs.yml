name: Deploy Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - 'wiki/**'
      - 'mkdocs.yml'
      - 'CHANGELOG.md'
      - 'requirements.txt'
      - 'deploy/wiki/**'
      - 'deploy/redeploy_wiki.sh'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'wiki/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy Wiki
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CLOUD_SERVER_IP }}
          username: ${{ secrets.CLOUD_SERVER_USER }}
          key: ${{ secrets.CLOUD_SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            TEMP_DIR=$(mktemp -d)
            trap 'rm -rf "$TEMP_DIR"' EXIT
            cd "$TEMP_DIR"
            git clone --branch ${{ github.ref_name }} https://github.com/${{ github.repository }}.git .
            bash deploy/redeploy_wiki.sh
      - name: Clear unused images
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CLOUD_SERVER_IP }}
          username: ${{ secrets.CLOUD_SERVER_USER }}
          key: ${{ secrets.CLOUD_SERVER_SSH_KEY }}
          script: |
            docker image prune -f

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build documentation
        run: mkdocs build --strict --verbose
