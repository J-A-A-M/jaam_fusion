name: Deploy Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - 'wiki/**'
      - 'mkdocs.yml'
      - 'CHANGELOG.md'
      - 'requirements.txt'
      - 'deploy/wiki/**'
      - 'deploy/redeploy_wiki.sh'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'wiki/**'
      - 'mkdocs.yml'
      - 'CHANGELOG.md'
      - 'requirements.txt'
      - 'deploy/wiki/**'
      - 'deploy/redeploy_wiki.sh'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
    inputs:
      server_choice:
        type: choice
        default: 'Server 1'
        description: Choose server
        options:
          - 'Server 1'
          - 'Server 2'

run-name: Deploy Documentation from '${{ github.ref_name }}' branch

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      SERVER_IP: ${{ inputs.server_choice == 'Server 2' && secrets.CLOUD_SERVER_2_IP || secrets.CLOUD_SERVER_IP }}
      SERVER_USER: ${{ inputs.server_choice == 'Server 2' && secrets.CLOUD_SERVER_2_USER || secrets.CLOUD_SERVER_USER }}
      SERVER_SSH_KEY: ${{ inputs.server_choice == 'Server 2' && secrets.CLOUD_SERVER_2_SSH_KEY || secrets.CLOUD_SERVER_SSH_KEY }}
    steps:
      - name: Deploy Wiki
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            TEMP_DIR=$(mktemp -d)
            trap 'rm -rf "$TEMP_DIR"' EXIT
            cd "$TEMP_DIR"
            git clone --branch ${{ github.ref_name }} https://github.com/${{ github.repository }}.git .
            bash deploy/redeploy_wiki.sh
      - name: Clear unused images
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          script: |
            docker image prune -f

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is required by the git-revision-date-localized plugin;
          # a shallow clone would emit a warning that --strict turns into a failure.
          fetch-depth: 0
          # Only materialize the docs in the working tree (cone mode still
          # includes root files like mkdocs.yml / requirements.txt), so the
          # repo's non-docs code isn't checked out to disk on every PR.
          sparse-checkout: wiki

      - name: Build documentation (strict)
        run: docker build --build-arg MKDOCS_BUILD_STRICT=true -f deploy/wiki/Dockerfile .
